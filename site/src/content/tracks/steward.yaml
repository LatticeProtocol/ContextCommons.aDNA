name: Steward Track
slug: steward
tagline: "Govern how AI tools operate in your community."
description: "An 8-week track for community leaders — pastors, teachers, organizers. Learn how AI tools guided by community knowledge work, conduct a community needs assessment, co-facilitate builder sessions, and develop a sustainability plan. You hold veto power over agent deployments."
icon: "shield"
audience: "Community stewards (pastors, teachers, organizers)"
prerequisites:
  - "Core Track completion"
duration_weeks: 8
modules:
  - "Phase 1 — Understanding (Weeks 1-3): How agents work, governance principles, risk assessment"
  - "Phase 2 — Practice (Weeks 4-6): Needs assessment, co-facilitation, builder support"
  - "Phase 3 — Ownership (Weeks 7-8): Sustainability plan, governance documentation, handoff"
competencies:
  - "S1: Needs assessment complete — community needs documented with elder and builder input"
  - "S2: Co-facilitation demonstrated — led or co-led at least two builder sessions"
  - "S3: Sustainability plan — written plan for maintaining systems after pilot ends"
order: 3
